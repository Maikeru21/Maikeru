<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Interaktywne Operatory w JavaScript</title>
  <style>
    * {margin:0;padding:0;box-sizing:border-box;}

    body {
      font-family: 'Poppins', sans-serif;
      background: url('tlo.gif') no-repeat center center fixed;
      background-size: cover;
      color: #00ffcc;
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1.7;
      font-size: 1.1rem;
      position: relative;
      overflow-x: hidden;
    }

    body::before { 
      background: rgba(0,0,0,0.4);
      content:"";
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      z-index:-1;
    }
    .return-container {
  margin: 30px 0 60px;
  display: flex;
  justify-content: center;
  width: 100%;
}

.link-btn {
  display: inline-block;
  padding: 14px 28px;
  font-size: 1rem;
  font-weight: 600;
  color: #111;
  background: linear-gradient(135deg, #00ffcc, #0088ff);
  border-radius: 12px;
  text-decoration: none;
  transition: all 0.3s ease;
  box-shadow: 0 0 12px #00ffcc, 0 0 24px #0088ff;
}
.link-btn:hover {
  transform: scale(1.08);
  background: linear-gradient(135deg, #00ffff, #00ff99);
  box-shadow: 0 0 18px #00ffff, 0 0 36px #00ff99;
}

    header, main, footer {
      width: 100%;
      display: flex;
      justify-content: center;
      flex-direction: column;
      align-items: center;
      text-align: center;
      color: #00ffcc;
    }

    header {
      padding: 80px 20px 40px;
    }

    header h1 {
      font-size: 3rem;
      margin-bottom: 20px;
      letter-spacing: 2px;
      color: #00e6ff;
      text-shadow: 0 0 10px #00e6ff, 0 0 20px #00ffff, 0 0 40px #0088ff;
      animation: neonPulse 2s infinite alternate;
    }

    main {
      width: 80%;
      max-width: 900px;
      padding: 40px;
      margin-bottom: 40px;
      background-color: rgba(20, 20, 20, 0.65);
      backdrop-filter: blur(6px);
      border-radius: 16px;
      border: 1px solid rgba(0, 255, 204, 0.4);
      box-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    main:hover {
      transform: scale(1.02);
      box-shadow: 0 0 30px rgba(0, 255, 204, 0.6);
    }

    section {
      margin-bottom: 30px;
      padding: 20px;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(0,255,204,0.4);
      border-radius: 12px;
      box-shadow: 0 0 12px rgba(0,255,204,0.3);
      transition: transform 0.3s, box-shadow 0.3s;
    }

    section:hover {
      transform: scale(1.02);
      box-shadow: 0 0 20px rgba(0,255,204,0.6);
    }

    h2 {
      color: #00e6ff;
      margin-bottom: 15px;
      text-shadow: 0 0 6px #00ffcc;
    }

    input, select {
      margin: 5px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid rgba(0,255,204,0.4);
      background: rgba(0,0,0,0.5);
      color: #00ffcc;
      font-size: 1rem;
      text-align: center;
    }

    button {
      margin-top: 10px;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 600;
      color: #111;
      background: linear-gradient(135deg, #00ffcc, #0088ff);
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 12px #00ffcc, 0 0 24px #0088ff;
    }

    button:hover {
      transform: scale(1.08);
      background: linear-gradient(135deg, #00ffff, #00ff99);
      box-shadow: 0 0 18px #00ffff, 0 0 36px #00ff99;
    }

    p {
      margin-top: 10px;
      font-size: 1.15rem;
      text-shadow: 0 0 6px #00ffcc;
    }

    @keyframes neonPulse {
      from { text-shadow: 0 0 10px #00e6ff, 0 0 20px #00ffff, 0 0 40px #0088ff; }
      to { text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffcc, 0 0 80px #00e6ff; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Interaktywne Operatory w JavaScript</h1>
  </header>

  <main>
    <!-- Operator arytmetyczny (dodawanie) -->
    <section>
      <h2>Operator arytmetyczny (+)</h2>
      <input type="number" id="arytA" placeholder="Liczba A">
      <input type="number" id="arytB" placeholder="Liczba B">
      <button onclick="dodawanie()">Oblicz</button>
      <p>Wynik: <span id="wynikAryt"></span></p>
    </section>

    <!-- Operator logiczny (AND) -->
    <section>
      <h2>Operator logiczny (&&)</h2>
      <select id="logA">
        <option value="true">true</option>
        <option value="false">false</option>
      </select>
      <select id="logB">
        <option value="true">true</option>
        <option value="false">false</option>
      </select>
      <button onclick="logiczny()">Sprawdź</button>
      <p>Wynik: <span id="wynikLog"></span></p>
    </section>

    <!-- Operator bitowy (OR) -->
    <section>
      <h2>Operator bitowy (|)</h2>
      <input type="number" id="bitA" placeholder="Liczba A">
      <input type="number" id="bitB" placeholder="Liczba B">
      <button onclick="bitowy()">Oblicz</button>
      <p>Wynik: <span id="wynikBit"></span></p>
    </section>

    <!-- Operator przypisania (+=) -->
    <section>
      <h2>Operator przypisania (+=)</h2>
      <input type="number" id="przypA" placeholder="Liczba początkowa">
      <input type="number" id="przypB" placeholder="Dodaj">
      <button onclick="przypisanie()">Oblicz</button>
      <p>Wynik: <span id="wynikPrzyp"></span></p>
    </section>

    <!-- Operator porównania (==) -->
    <section>
      <h2>Operator porównania (==)</h2>
      <input type="text" id="porA" placeholder="Wartość A">
      <input type="text" id="porB" placeholder="Wartość B">
      <button onclick="porownanie()">Sprawdź</button>
      <p>Wynik: <span id="wynikPor"></span></p>
    </section>

    <!-- Operator łańcuchowy (konkatenacja) -->
    <section>
      <h2>Operator łańcuchowy (+)</h2>
      <input type="text" id="strA" placeholder="Tekst A">
      <input type="text" id="strB" placeholder="Tekst B">
      <button onclick="konkatenacja()">Połącz</button>
      <p>Wynik: <span id="wynikStr"></span></p>
    </section>
  </main>
  <div class="return-container">
    <a href="index.html" class="link-btn">⬅ Powrót do strony głównej</a>
  </div>

  <script>
    function dodawanie() {
      let a = Number(document.getElementById("arytA").value);
      let b = Number(document.getElementById("arytB").value);
      document.getElementById("wynikAryt").textContent = a + b;
    }

    function logiczny() {
      let a = document.getElementById("logA").value === "true";
      let b = document.getElementById("logB").value === "true";
      document.getElementById("wynikLog").textContent = a && b;
    }

    function bitowy() {
      let a = Number(document.getElementById("bitA").value);
      let b = Number(document.getElementById("bitB").value);
      document.getElementById("wynikBit").textContent = a | b;
    }

    function przypisanie() {
      let a = Number(document.getElementById("przypA").value);
      let b = Number(document.getElementById("przypB").value);
      a += b;
      document.getElementById("wynikPrzyp").textContent = a;
    }

    function porownanie() {
      let a = document.getElementById("porA").value;
      let b = document.getElementById("porB").value;
      document.getElementById("wynikPor").textContent = (a == b);
    }

    function konkatenacja() {
      let a = document.getElementById("strA").value;
      let b = document.getElementById("strB").value;
      document.getElementById("wynikStr").textContent = a + b;
    }
  </script>
</body>
</html>
