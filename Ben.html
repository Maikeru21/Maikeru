<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ben 10 Classic - Konwerter Mocy</title>
  <style>
   * {margin:0;padding:0;box-sizing:border-box;}
    body {
  font-family:'Poppins',sans-serif;
  /* animowane tło GIF + gradient */
  background: linear-gradient(135deg, rgba(0,0,0,0.8), rgba(0,30,0,0.8)),
              url("https://media2.giphy.com/media/v1.Y2lkPTc5MGI3NjExcnhuNGY0ODllb3B6MHp0eWpiMmhxNTV6amZ0bXI1azl2bmMwNTN0MyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/8Zaoyr0zW9NJLiF6Pv/giphy.gif") center center fixed;
  background-size: 80%;   /* zmniejsza tło */
  background-repeat: repeat; /* powtarza tło dla pełnego efektu */
  color: #00ffcc;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align:center;
  line-height: 1.7;
  font-size: 1.1rem;
  min-height:100vh;
  overflow-x:hidden;
}


body::before { 
  background: rgba(0,0,0,0.45);
  content:"";
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  z-index:-1;
}

/* kontener */
.container {
  margin-top:80px;
  width:90%;
  max-width:700px;
  padding:40px;
  background-color:rgba(20,20,20,0.65);
  border-radius:16px;
  border:1px solid rgba(0,255,204,0.4);
  box-shadow:0 0 20px rgba(0,255,204,0.5);
  backdrop-filter: blur(6px);
  transition: transform 0.3s;
}
.container:hover {
  transform:scale(1.02);
  box-shadow:0 0 30px rgba(0,255,204,0.8);
}

/* nagłówek */
h1 {
  font-size:2.8rem;
  margin-bottom:20px;
  color:#00ff99;
  text-shadow:0 0 10px #00ff99, 0 0 20px #00ffcc, 0 0 40px #00e6ff;
  animation: neonPulse 2s infinite alternate;
}
p {
  font-size:1.2rem;
  margin-bottom:15px;
  color:#b8ffec;
  text-shadow:0 0 6px #00ffcc;
}

/* input */
input {
  padding:14px;
  width:80%;
  margin-top:15px;
  border:1px solid rgba(0,255,204,0.5);
  border-radius:10px;
  font-size:1.1rem;
  background:rgba(0,0,0,0.4);
  color:#00ffcc;
  text-align:center;
  box-shadow:0 0 10px rgba(0,255,204,0.4);
  outline:none;
  transition:all 0.3s ease;
}
input:focus {
  border-color:#00ff99;
  box-shadow:0 0 15px #00ff99;
}

/* button */
button {
  margin-top:20px;
  padding:14px 28px;
  font-size:1.1rem;
  font-weight:600;
  color:#111;
  background:linear-gradient(135deg,#00ffcc,#0088ff);
  border-radius:12px;
  border:none;
  cursor:pointer;
  transition:all 0.3s ease;
  box-shadow:0 0 12px #00ffcc, 0 0 24px #0088ff;
}
button:hover {
  transform:scale(1.08);
  background:linear-gradient(135deg,#00ffff,#00ff99);
  box-shadow:0 0 18px #00ffff, 0 0 36px #00ff99;
}

/* wynik */
.wynik {
  margin-top:25px;
  font-size:1.4rem;
  font-weight:600;
  color:#00ffcc;
  text-shadow:0 0 8px #00ffcc, 0 0 20px #00ffff;
}

/* stopka */
.footer {
  margin-top:60px;
  padding:20px;
  background-color:rgba(15,15,15,0.85);
  border-top:1px solid rgba(0,255,204,0.3);
  width:100%;
  text-align:center;
  font-size:1rem;
  color:#00ffcc;
  text-shadow:0 0 6px #00ffcc;
}

/* animacja */
@keyframes neonPulse {
  from { text-shadow:0 0 10px #00ff99, 0 0 20px #00ffcc, 0 0 40px #00e6ff; }
  to { text-shadow:0 0 20px #00ffff, 0 0 40px #00ff99, 0 0 80px #00ffcc; }
}

/* responsywność */
@media(max-width:768px){
  h1 {font-size:2.2rem;}
  p {font-size:1rem;}
  .wynik {font-size:1.2rem;}
}
  </style>
</head>
<body>
  <div class="container">
    <h1>Ben 10 Classic - Konwerter Mocy Omnitrixa</h1>
    <p>Wpisz moc (jako tekst), a Omnitrix przekonwertuje ją na wartość liczbową!</p>

    <label for="mocInput">Moc postaci (np. 9000):</label><br>
    <input type="text" id="mocInput" placeholder="Wpisz moc...">
    <br>
    <button onclick="przeliczMoc()">Konwertuj</button>

    <p id="wynik" class="wynik"></p>
  </div>

  <div class="footer">
    <p> Strona stworzona przez Maikeru </p>
  </div>

  <script>
    function przeliczMoc() {
      var tekstowaMoc = document.getElementById("mocInput").value;
      let liczbowo = Number(tekstowaMoc);
      const intro = "Moc Omnitrixa została ustawiona na";

      if (isNaN(liczbowo)) {
        document.getElementById("wynik").innerText = "🚫 To nie wygląda jak prawdziwa moc!";
      } else {
        document.getElementById("wynik").innerText = `${intro}: ${liczbowo} punktów mocy 💥`;
      }
    }
  </script>
</body>
</html>
